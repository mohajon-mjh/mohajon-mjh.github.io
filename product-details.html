<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Product Details</title>
<style>
body{font-family:Arial;padding:20px}
img{width:100%;max-width:400px}
.price{font-size:24px;font-weight:bold}
</style>
</head>
<body>
<div id="menuBtn" class="hamburger">☰</div>
<nav id="sideMenu" class="side-menu">
<h3>Categories</h3>
<ul id="categoryList"></ul>
</nav>

<h1 id="name">Loading...</h1>
<img id="image" src="">
<p id="category"></p>
<p id="price" class="price"></p>

<button onclick="addCart()">Add Cart</button>

<script>
const id=new URLSearchParams(location.search).get('id');

fetch('products.json')
.then(r=>r.json())
.then(products=>{

const p=products.find(x=>x.id==id);

if(!p)return;

document.getElementById('name').innerText=p.name;
document.getElementById('image').src=p.image;
document.getElementById('category').innerText='Category: '+p.category;
document.getElementById('price').innerText='৳'+p.price;

});

function addCart(){
let c=parseInt(localStorage.getItem('cart')||0);
localStorage.setItem('cart',c+1);
alert('Added to Cart');
}
</script>

<script src="assets/navbar.js"></script>
<script type="module" src="product-details.js"></script>
<script type="module" src="auth-role.js"></script>
<script src="cart.js"></script>
<script src="wishlist.js"></script>
<script src="category-menu.js"></script>
</body>
</html>
