<!DOCTYPE html>
<html>
<head>
  <title>Fix Categories</title>
</head>
<body>
<h3>Updating Firebase categories...</h3>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDj_LLHWBgkCfQClnaOUqEtULHhP1vSVxw",
  authDomain: "mohajon-mjh.firebaseapp.com",
  databaseURL: "https://mohajon-mjh-default-rtdb.firebaseio.com",
  projectId: "mohajon-mjh",
  storageBucket: "mohajon-mjh.firebasestorage.app",
  messagingSenderId: "526105903976",
  appId: "1:526105903976:web:f9321c6d68ecbd19d58cdd"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const productsRef = ref(db,"products");

// ✅ 1. FORCE CREATE "grocery" category
set(ref(db,"categories/grocery"), {
  name: "Grocery",
  image: "https://source.unsplash.com/300x200/?grocery",
  link: "categories/grocery.html"
});

// ✅ 2. Update all products
onValue(productsRef,(snap)=>{

  snap.forEach((child)=>{

    update(ref(db,"products/"+child.key),{
      category:"grocery"
    });

  });

  console.log("DONE: all products moved to grocery + category created");
});

</script>
</body>
</html>
