<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Products - Mohajon MJH</title>

<style>
body{margin:0;background:#f5f5f5;font-family:Arial}
.header{background:#fff;padding:10px;display:flex;gap:10px}
.search{flex:1;padding:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px;padding:15px}
.card{background:#fff;padding:10px;border-radius:10px}
.card img{width:100%;height:200px;object-fit:cover}
.price{color:#b12704;font-weight:bold}
.buy{width:100%;padding:10px;background:#ff9900;border:0}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDj_LLHWBgcKfQClnaOUqEtULHhP1vSVxw",
  authDomain: "mohajon-mjh.firebaseapp.com",
  databaseURL: "https://mohajon-mjh-default-rtdb.firebaseio.com",
  projectId: "mohajon-mjh",
  storageBucket: "mohajon-mjh.firebasestorage.app",
  messagingSenderId: "526105903976",
  appId: "1:526105903976:web:f9321c6d68ecbd19d58cdd"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.allProducts=[];

window.addCart=function(id){
let cart=JSON.parse(localStorage.getItem("cart")||"[]");
cart.push(id);
localStorage.setItem("cart",JSON.stringify(cart));
alert("Added to Cart");
}

function render(items){
const box=document.getElementById('products');
box.innerHTML='';

items.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>${p.category||''}</p>
<p>${p.weight||''}</p>
<p class="price">৳${p.price}</p>
<button class="buy" onclick="addCart('${p.id}')">Add Cart</button>
</div>`;
});
}

window.addEventListener('DOMContentLoaded',()=>{

onValue(ref(db,"products"),snapshot=>{

const data=snapshot.val()||{};
window.allProducts=Object.values(data);

render(window.allProducts);

document.getElementById('search').onkeyup=e=>{
const q=e.target.value.toLowerCase();

render(
window.allProducts.filter(p=>
(p.name||'').toLowerCase().includes(q)
)
);
};

});

});

</script>
</head>

<body>

<div class="header">
<input id="search" class="search" placeholder="Search products...">
<a href="cart.html">🛒 Cart</a>
</div>

<div id="products" class="grid"></div>

</body>
</html>
