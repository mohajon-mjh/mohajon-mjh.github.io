<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products · Mohajon Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="product-card-upgrade.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 0 0.5rem; border-bottom: 1px solid #e9edf2; flex-wrap: wrap; gap: 10px; }
        .page-header h1 { font-size: 1.8rem; font-weight: 600; color: #0b1a2e; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; margin: 1.2rem 0 1.8rem; }
        .filter-bar .search-box { flex: 1 1 260px; display: flex; border-radius: 40px; background: white; border: 1px solid #dce1e8; }
        .filter-bar .search-box input { border: none; padding: 0.7rem 1.2rem; font-size: 0.95rem; width: 100%; background: transparent; outline: none; border-radius: 40px; }
        .filter-bar .category-select { padding: 0.6rem 2rem 0.6rem 1.2rem; border-radius: 40px; border: 1px solid #dce1e8; background: white; font-size: 0.95rem; min-width: 160px; cursor: pointer; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 28px; padding: 8px 0 40px; }
        .loading-placeholder { grid-column: 1 / -1; text-align: center; padding: 4rem 0; color: #5f6c80; }
        
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        
        .product-card-image {
            position: relative;
            width: 100%;
            height: 280px;
            background: #f1f3f5;
            overflow: hidden;
            flex-shrink: 0;
        }
        .product-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #f1f3f5;
        }
        .stock-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            color: white;
            z-index: 2;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stock-badge.in-stock { background: #22c55e; }
        .stock-badge.low-stock { background: #f59e0b; }
        .stock-badge.out-of-stock { background: #ef4444; }
        
        .discount-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            background: #dc2626;
            color: white;
            z-index: 2;
        }
        
        .product-card-content {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .product-card-title {
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 4px;
            color: #0b1a2e;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
            min-height: 2.6rem;
        }
        .product-card-category {
            font-size: 0.8rem;
            color: #6b7a8f;
            margin-bottom: 8px;
        }
        .product-card-price {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 6px 0;
        }
        .current-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0b1a2e;
        }
        .old-price {
            font-size: 0.9rem;
            color: #94a3b8;
            text-decoration: line-through;
        }
        .product-card-weight {
            font-size: 0.8rem;
            color: #6b7a8f;
            margin: 4px 0;
        }
        .product-card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
            margin-top: auto;
        }
        .product-card-actions button,
        .product-card-actions a {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .btn-add-to-cart {
            background: #2563eb;
            color: white;
            flex: 1;
        }
        .btn-add-to-cart:hover { background: #1d4ed8; }
        .btn-wishlist {
            background: #f1f3f5;
            color: #0b1a2e;
            font-size: 1.1rem;
            padding: 8px 14px;
            min-width: 40px;
        }
        .btn-wishlist.active {
            background: #fee2e2;
            color: #dc2626;
        }
        .btn-view-details {
            background: #f1f3f5;
            color: #0b1a2e;
            padding: 8px 14px;
            border-radius: 8px;
        }
        .btn-view-details:hover { background: #e5e7eb; }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .filter-bar { flex-direction: column; align-items: stretch; }
            .product-grid { 
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
                gap: 12px; 
            }
            .product-card-image { 
                height: 160px; 
            }
            .product-card-title {
                font-size: 0.85rem;
                min-height: 2.2rem;
            }
            .current-price {
                font-size: 1rem;
            }
            .product-card-actions button,
            .product-card-actions a {
                font-size: 0.7rem;
                padding: 6px 10px;
            }
            .btn-add-to-cart {
                flex: 1;
                min-width: 60px;
            }
            .product-card-content {
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            .product-grid { 
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
                gap: 10px; 
            }
            .product-card-image { 
                height: 140px; 
            }
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <main class="container">
        <div class="page-header">
            <h1>All Products</h1>
            <span id="product-count" style="color:#4a5a6e;">0 items</span>
        </div>
        <div class="filter-bar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search products..." />
            </div>
            <select id="categoryFilter" class="category-select">
                <option value="all">All Categories</option>
            </select>
        </div>
        <div id="productGrid" class="product-grid">
            <div class="loading-placeholder">Loading products …</div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDj_LLHWBgcKfQClnaOUqEtULHhP1vSVxw",
            authDomain: "mohajon-mjh.firebaseapp.com",
            databaseURL: "https://mohajon-mjh-default-rtdb.firebaseio.com",
            projectId: "mohajon-mjh",
            storageBucket: "mohajon-mjh.firebasestorage.app",
            messagingSenderId: "526105903976",
            appId: "1:526105903976:web:f9321c6d68ecbd19d58cdd"
        };
        firebase.initializeApp(firebaseConfig);
        window.db = firebase.database();

        window.db.ref('products').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const cats = new Set();
                Object.values(data).forEach(p => {
                    if (p.category) cats.add(p.category);
                });
                const select = document.getElementById('categoryFilter');
                select.innerHTML = '<option value="all">All Categories</option>';
                cats.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat;
                    opt.textContent = cat;
                    select.appendChild(opt);
                });
            }
        });
    </script>
    <script src="products-loader.js"></script>
    <script src="product-render.js"></script>
    <script src="assets/navbar.js"></script>
</body>
</html>
