<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Products - Mohajon MJH</title>

<style>
body{margin:0;background:#f5f5f5;font-family:Arial}
.header{background:#fff;padding:10px;display:flex;gap:10px}
.search{flex:1;padding:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px;padding:15px}
.card{background:#fff;padding:10px;border-radius:10px}
.card img{width:100%;height:200px;object-fit:cover}
.price{color:#b12704;font-weight:bold}
.buy{width:100%;padding:10px;background:#ff9900;border:0}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDj_LLHWBgcKfQClnaOUqEtULHhP1vSVxw",
  authDomain: "mohajon-mjh.firebaseapp.com",
  databaseURL: "https://mohajon-mjh-default-rtdb.firebaseio.com",
  projectId: "mohajon-mjh",
  storageBucket: "mohajon-mjh.firebasestorage.app",
  messagingSenderId: "526105903976",
  appId: "1:526105903976:web:f9321c6d68ecbd19d58cdd"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.allProducts=[];

window.addCart=function(id){
let cart=JSON.parse(localStorage.getItem("cart")||"[]");
cart.push(id);
localStorage.setItem("cart",JSON.stringify(cart));
alert("Added to Cart");
}

function render(items){
const box=document.getElementById('products');
box.innerHTML='';

items.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>${p.category||''}</p>
<p>${p.weight||''}</p>
<p class="price">৳${p.price}</p>
<button class="buy" onclick="addCart('${p.id}')">Add Cart</button><br><br><a href="product-details.html?id=${p.id}">View Details</a>
</div>`;
});
}

window.addEventListener('DOMContentLoaded',()=>{

onValue(ref(db,"products"),snapshot=>{

const data=snapshot.val()||{};
window.allProducts=Object.values(data);

render(window.allProducts);

function applyFilters(){
const q=(document.getElementById('search').value||'').toLowerCase();
const cat=(document.getElementById('categoryFilter')?.value||'');
render(window.allProducts.filter(p=>{
const name=(p.name||'').toLowerCase();
const matchName=name.includes(q);
const matchCat=!cat || (p.category||"")===cat;
return matchName && matchCat;
}));
}

document.getElementById('search').onkeyup=applyFilters;
document.getElementById("categoryFilter").onchange=applyFilters;

});

});

</script>
</head>

<body>

<div class="header">
<input id="search" class="search" placeholder="Search products...">
<select id="categoryFilter" class="search">
<option value="">All Categories</option>
<option>Electronics</option>
<option>Electronic Accessories</option>
<option>Computers</option>
<option>Mobile Phones</option>
<option>TV & Appliances</option>
<option>Home & Kitchen</option>
<option>Home & Lifestyle</option>
<option>Grocery</option>
<option>Food & Beverages</option>
<option>Health & Beauty</option>
<option>Women Fashion</option>
<option>Men Fashion</option>
<option>Watches & Bags</option>
<option>Mother & Baby</option>
<option>Toys & Games</option>
<option>Sports & Outdoors</option>
<option>Automotive</option>
<option>Pet Supplies</option>
<option>Books</option>
<option>Stationery</option>
<option>Tools</option>
<option>Software</option>
<option>মসলা</option>
<option>গ্রোসারি</option>
<option>খাদ্য</option>
</select>
<a href="cart.html">🛒 Cart (<span id="cartCount">0</span>)</a> <a href="wishlist.html">❤️ Wishlist</a>
</div>

<div id="products" class="grid"></div>

<script src="assets/navbar.js"></script>
</body>
</html>
