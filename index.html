<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohajon MJH Marketplace</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#131921;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
height:70px;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

.banner{
width:100%;
display:block;
}

.categories{
padding:40px 20px;
text-align:center;
}

.categories h2{
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.products{
padding:40px 20px;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.product img{
width:100%;
height:180px;
object-fit:cover;
}

.product button{
width:100%;
padding:10px;
margin-top:10px;
background:#ff9900;
border:none;
font-weight:bold;
cursor:pointer;
}

footer{
background:#131921;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<img src="assets/images/logo.png" class="logo">

<nav>
<a href="#">Home</a>
<a href="#">Categories</a>
<a href="#">Products</a>
<a href="#">Vendors</a>
<a href="#">Contact</a>
</nav>
</header>

<img src="assets/images/banner.jpg" class="banner">

<section class="categories">
<h2>Popular Categories</h2>

<div class="grid">
<div class="card">Electronics</div>
<div class="card">Fashion</div>
<div class="card">Home & Living</div>
<div class="card">Beauty</div>
<div class="card">Sports</div>
<div class="card">Groceries</div>
</div>
</section>

<section class="products">
<h2>Featured Products</h2>

<div class="product-grid">

<div class="product">
<img src="https://via.placeholder.com/300x200">
<h3>Sample Product</h3>
<p>$29.99</p>
<button>Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/300x200">
<h3>Sample Product</h3>
<p>$39.99</p>
<button>Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/300x200">
<h3>Sample Product</h3>
<p>$49.99</p>
<button>Add to Cart</button>
</div>

</div>
</section>

<footer>
© 2026 Mohajon MJH Marketplace
</footer>

</body>
</html>
