<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mohajon MJH Marketplace</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:white;
display:flex;
align-items:center;
gap:15px;
padding:12px;
}

.logo img{
width:130px;
}

.search{
flex:1;
display:flex;
}

.search input{
width:100%;
padding:12px;
}

.search button{
padding:12px 20px;
background:#ff9800;
border:0;
}

.cart{
font-size:25px;
}

nav{
background:#232f3e;
color:white;
padding:15px;
display:flex;
gap:25px;
}

.hero img{
width:100%;
height:350px;
object-fit:cover;
}

.section{
padding:20px;
}

.categories,
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
}

@media(max-width:600px){

header{
flex-wrap:wrap;
}

.hero img{
height:180px;
}

}
</style>

</head>

<body>

<header>

<div class="logo">
<img src="assets/images/logo.png">
</div>

<div class="search">
<input placeholder="Search products">
<button>🔍</button>
</div>

<div class="cart">
🛒
</div>

</header>


<nav>
Home
Categories
Offers
Products
</nav>


<section class="hero">
<img src="assets/images/banner.jpg">
</section>


<div class="section">

<h2>Categories</h2>

<div class="categories">

<div class="box">মসলা</div>
<div class="box">গ্রোসারি</div>
<div class="box">খাদ্য</div>
<div class="box">অন্যান্য</div>

</div>

</div>



<div class="section">

<h2>Featured Products</h2>

<div class="products">

<div class="box product">
<h3>Tejpat</h3>
<p>৳100</p>
</div>

<div class="box product">
<h3>Gol Morich</h3>
<p>৳150</p>
</div>

<div class="box product">
<h3>Holud Gura</h3>
<p>৳120</p>
</div>

</div>

</div>


</body>
</html>
