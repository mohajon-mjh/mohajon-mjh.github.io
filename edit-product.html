<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Edit Product</title>

<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/pages/seller.css">
<link rel="stylesheet" href="css/global-menu.css">
</head>
<body>
<div id="menuBtn" class="hamburger">☰</div>
<nav id="sideMenu" class="side-menu">
<h3>Categories</h3>
<ul id="categoryList"></ul>
</nav>

<h2>Edit Product</h2>

<input id="name" placeholder="Product Name"><br><br>

<input id="price" type="number" placeholder="Price"><br><br>

<input id="stock" type="number" placeholder="Stock Quantity"><br><br>

<input id="image" placeholder="Image URL"><br><br>

<select id="weight">
<option value="">Weight</option>
<option>100g</option>
<option>250g</option>
<option>500g</option>
<option>1kg</option>
<option>2kg</option>
<option>5kg</option>
</select>

<br><br>

<select id="category">
<option value="">Category</option>
<option>Spices</option>
<option>Rice</option>
<option>Oil</option>
<option>Snacks</option>
<option>Beverages</option>
<option>Electronics</option>
</select>

<br><br>

<button id="saveBtn">Update Product</button>

<script type="module" src="edit-product.js"></script>

<script src="cart.js"></script>
<script src="wishlist.js"></script>
<script src="js/global-menu.js?v=2"></script>
</body>
</html>
