<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Checkout</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
input,textarea{width:100%;padding:10px;margin:5px 0}
button{width:100%;padding:12px;background:#25D366;color:#fff;border:0;font-size:18px}
.box{background:#fff;padding:15px;border-radius:10px}
</style>
</head>
<body>

<h2>🧾 Checkout</h2>

<div class="box">

<input id="name" placeholder="আপনার নাম">
<input id="phone" placeholder="মোবাইল নম্বর">
<h3>Payment Method</h3>
<button onclick="setPayment("COD")">Cash on Delivery</button>
<button onclick="setPayment("bKash")">bKash</button>
<button onclick="setPayment("Nagad")">Nagad</button>
<br><br>
<textarea id="address" placeholder="ঠিকানা"></textarea>

<button onclick="placeOrder()">Order Confirm</button>

</div>

<script>
function placeOrder(){

let cart=JSON.parse(localStorage.getItem('cart')||'[]');

if(cart.length==0){
alert("Cart empty");
return;
}

let name=document.getElementById('name').value;
let phone=document.getElementById('phone').value;
<h3>Payment Method</h3>
<button onclick="setPayment("COD")">Cash on Delivery</button>
<button onclick="setPayment("bKash")">bKash</button>
<button onclick="setPayment("Nagad")">Nagad</button>
<br><br>
let address=document.getElementById('address').value;

let msg="New Order%0A";
msg+="Name: "+name+"%0A";
msg+="Phone: "+phone+"%0A";
<h3>Payment Method</h3>
<button onclick="setPayment("COD")">Cash on Delivery</button>
<button onclick="setPayment("bKash")">bKash</button>
<button onclick="setPayment("Nagad")">Nagad</button>
<br><br>
msg+="Address: "+address+"%0A";
msg+="Items: "+cart.join(", ");

let url="https://wa.me/8801000000000?text="+msg;

window.open(url,'_blank');

localStorage.removeItem('cart');

}
</script>

<script src="assets/navbar.js"></script>
<script type="module" src="checkout.js"></script>
<script type="module" src="auth-role.js"></script>
<script src="cart.js"></script>
<script src="wishlist.js"></script>
</body>
</html>
