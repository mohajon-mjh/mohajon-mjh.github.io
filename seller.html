<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Seller Panel - Secure V1.2B</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      background:#f4f4f4;
      padding:20px;
    }

    .box{
      max-width:500px;
      margin:auto;
      background:#fff;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2{
      text-align:center;
    }

    input, textarea, select, button{
      width:100%;
      padding:10px;
      margin-top:10px;
    }

    button{
      background:#28a745;
      color:white;
      border:none;
      cursor:pointer;
    }

    button:disabled{
      background:gray;
      cursor:not-allowed;
    }

    .warning{
      color:red;
      text-align:center;
      margin-top:10px;
      font-weight:bold;
    }

    .hidden{
      display:none;
    }
  </style>
</head>

<body>
<div id="menuBtn" class="hamburger">☰</div>
<nav id="sideMenu" class="side-menu">
<h3>Categories</h3>
<ul id="categoryList"></ul>
</nav>

<div class="box">

  <h2>Seller Upload (Secure V1.2B)</h2>

  <div id="status" class="warning">Checking seller verification...</div>

  <form id="product-form" class="hidden">

    <input type="text" id="product-name" placeholder="Product Name" required>

    <input type="number" id="product-price" placeholder="Price" required>

    <textarea id="product-desc" placeholder="Description"></textarea>

    <input type="number" id="product-stock" placeholder="Stock">

    <select id="product-category">
      <option>Food</option>
      <option>Spice</option>
      <option>Other</option>
    </select>

    <input type="file" id="product-image">

    <button type="submit">Upload Product</button>

  </form>

  <div id="blocked" class="warning hidden">
    ❌ You are not verified seller. Upload disabled.
  </div>

</div>

<script type="module" src="assets/js/upload.js"></script>

<script>
  // UI lock handler (upload.js থেকে control হবে)
  window.lockSellerUI = function(isVerified){

    const form = document.getElementById("product-form");
    const status = document.getElementById("status");
    const blocked = document.getElementById("blocked");

    if(isVerified){
      status.style.display="none";
      form.classList.remove("hidden");
      blocked.classList.add("hidden");
    }else{
      status.style.display="none";
      form.classList.add("hidden");
      blocked.classList.remove("hidden");
    }
  };
</script>

<script src="category-menu.js"></script>
</body>
</html>
