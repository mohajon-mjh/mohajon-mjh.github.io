<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Seller Panel - Secure V1.2B</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      background:#f4f4f4;
      padding:20px;
    }

    .box{
      max-width:500px;
      margin:auto;
      background:#fff;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h2{
      text-align:center;
    }

    input, textarea, select, button{
      width:100%;
      padding:10px;
      margin-top:10px;
    }

    button{
      background:#28a745;
      color:white;
      border:none;
      cursor:pointer;
    }

    button:disabled{
      background:gray;
      cursor:not-allowed;
    }

    .warning{
      color:red;
      text-align:center;
      margin-top:10px;
      font-weight:bold;
    }

    .hidden{
      display:none;
    }
  </style>
<link rel="stylesheet" href="css/global-menu.css">
</head>

<body>
<div id="menuBtn" class="hamburger">☰</div>
<nav id="sideMenu" class="side-menu">
<h3>Categories</h3>
<ul id="categoryList"></ul>
</nav>

<div class="box">

  <h2>Seller Upload (Secure V1.2B)</h2>

  <div id="status" class="warning">Checking seller verification...</div>

  <form id="product-form" class="hidden">

    <input type="text" id="product-name" placeholder="Product Name" required>

    <input type="number" id="product-price" placeholder="Price" required>

    <textarea id="product-desc" placeholder="Description"></textarea>

    <input type="number" id="product-stock" placeholder="Stock">

    <select id="product-category">
      <option value="">ক্যাটাগরি নির্বাচন করুন</option>
      <option value="agriculture_food_beverage">Agriculture, Food & Beverage</option>
      <option value="air_conditioners_refrigerators_washing_machines">Air Conditioners, Refrigerators, Washing Machines</option>
      <option value="appliances_home_appliances_large_small">Appliances (Home Appliances)</option>
      <option value="art_collectibles_crafts">Art, Collectibles & Crafts</option>
      <option value="automotive_vehicle_parts_accessories">Automotive, Vehicle Parts & Accessories</option>
      <option value="baby_products_baby_essentials">Baby Products, Baby Essentials</option>
      <option value="beauty_personal_care">Beauty & Personal Care</option>
      <option value="bicycles_scooters_electric_vehicles">Bicycles, Scooters & Electric Vehicles</option>
      <option value="books_media_music">Books, Media & Music</option>
      <option value="business_industrial_machinery">Business & Industrial, Machinery</option>
      <option value="cameras_photo">Cameras & Photo</option>
      <option value="clothing_fashion_apparel_men_women_kids">Clothing, Fashion & Apparel</option>
      <option value="computers_tablets_networking">Computers, Tablets & Networking</option>
      <option value="construction_building_materials">Construction & Building Materials</option>
      <option value="consumer_electronics">Consumer Electronics</option>
      <option value="drones_action_cameras">Drones & Action Cameras</option>
      <option value="electrical_equipment_supplies">Electrical Equipment & Supplies</option>
      <option value="electronics_tv_audio_gaming_etc">Electronics (TV, Audio, Gaming)</option>
      <option value="food_grocery">Food & Grocery</option>
      <option value="furniture_home_decor">Furniture & Home Decor</option>
      <option value="furniture_sofas_beds_etc">Furniture (Sofas, Beds, etc.)</option>
      <option value="gardening_outdoor_living">Gardening & Outdoor Living</option>
      <option value="gifts_crafts">Gifts & Crafts</option>
      <option value="headphones_speakers_audio">Headphones, Speakers & Audio</option>
      <option value="health_medical_supplies">Health & Medical Supplies</option>
      <option value="health_wellness">Health & Wellness</option>
      <option value="home_kitchen">Home & Kitchen</option>
      <option value="home_improvement_tools_hardware">Home Improvement, Tools & Hardware</option>
      <option value="industrial_machinery_equipment">Industrial Machinery & Equipment</option>
      <option value="jewelry_eyewear_watches">Jewelry, Eyewear & Watches</option>
      <option value="laptops_pcs">Laptops & PCs</option>
      <option value="lighting_lamps">Lighting & Lamps</option>
      <option value="luggage_bags_cases">Luggage, Bags & Cases</option>
      <option value="makeup_skincare_fragrance">Makeup, Skincare & Fragrance</option>
      <option value="mobile_phones_accessories">Mobile Phones & Accessories</option>
      <option value="office_school_supplies">Office & School Supplies</option>
      <option value="pet_supplies">Pet Supplies</option>
      <option value="power_tools_hand_tools">Power Tools & Hand Tools</option>
      <option value="renewable_energy">Renewable Energy</option>
      <option value="safety_security">Safety & Security</option>
      <option value="shoes_accessories">Shoes & Accessories</option>
      <option value="smart_home_surveillance">Smart Home & Surveillance</option>
      <option value="sports_outdoors_fitness">Sports & Outdoors, Fitness</option>
      <option value="toys_games_hobbies">Toys, Games & Hobbies</option>
      <option value="vehicles_transportation">Vehicles & Transportation</option>
      <option value="video_games_consoles">Video Games & Consoles</option>
    </select>

    <input type="file" id="product-image">

    <button type="submit">Upload Product</button>

  </form>

  <div id="blocked" class="warning hidden">
    ❌ You are not verified seller. Upload disabled.
  </div>

</div>

<script type="module" src="assets/js/upload.js?v=2"></script>

<script>
  // UI lock handler (upload.js থেকে control হবে)
  window.lockSellerUI = function(isVerified){

    const form = document.getElementById("product-form");
    const status = document.getElementById("status");
    const blocked = document.getElementById("blocked");

    if(isVerified){
      status.style.display="none";
      form.classList.remove("hidden");
      blocked.classList.add("hidden");
    }else{
      status.style.display="none";
      form.classList.add("hidden");
      blocked.classList.remove("hidden");
    }
  };
</script>

<script src="js/global-menu.js?v=2"></script>
</body>
</html>
